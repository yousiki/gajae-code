services:
  # ───────────────────────────────────────────────────────────────────────────
  # robogjc orchestrator
  #
  # NOTE: `env_file:` is INTENTIONALLY ABSENT. We never want the gh-proxy's
  # PAT (`GITHUB_TOKEN` in .env) to leak into this container's environment.
  # Every variable below is an explicit allowlist; compose still reads `.env`
  # for `${VAR}` interpolation, but only the keys listed here flow into the
  # container. Adding a new secret means an explicit compose-level decision
  # about which container is allowed to see it.
  # ───────────────────────────────────────────────────────────────────────────
  robogjc:
    build:
      # pi root: gives the web-builder stage access to the workspace
      # bun.lock + catalog (web/package.json refs `catalog:` versions).
      # python/robogjc/data and pi-root excludes are filtered via
      # Dockerfile.robogjc.dockerignore at the context root.
      context: ../..
      dockerfile: Dockerfile.robogjc
      args:
        # Tag of the pre-built pi-base image produced by `bun run pi:image`
        # (sources: pi root /Dockerfile). Override per-environment as needed.
        PI_BASE: gajae-code/pi:dev
    image: robogjc:dev
    container_name: robogjc
    # Phase B (graceful shutdown): gives the orchestrator at least
    # ROBGJC_SHUTDOWN_DRAIN_TIMEOUT_SECONDS + ROBGJC_SHUTDOWN_KILL_TIMEOUT_SECONDS
    # before SIGKILL. Defaults: 25 + 5 = 30s.
    stop_grace_period: 30s
    restart: unless-stopped
    command: ["robogjc", "serve"]
    environment:
      # --- GitHub auth ---
      # Phase 8 Rust cutover: this Rust service is the active mutating webhook
      # consumer, but it must never hold the PAT. All GitHub API and git
      # transport calls go through the HMAC-protected gh-proxy sidecar.
      ROBGJC_GH_PROXY_URL: ${ROBGJC_GH_PROXY_URL:-http://gh-proxy:8081}
      ROBGJC_GH_PROXY_HMAC_KEY: ${ROBGJC_GH_PROXY_HMAC_KEY:?ROBGJC_GH_PROXY_HMAC_KEY must be set in .env}

      # --- webhook + identity ---
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:?GITHUB_WEBHOOK_SECRET must be set in .env}
      ROBGJC_BOT_LOGIN: ${ROBGJC_BOT_LOGIN:?ROBGJC_BOT_LOGIN must be set in .env}
      ROBGJC_GIT_AUTHOR_NAME: ${ROBGJC_GIT_AUTHOR_NAME:-}
      ROBGJC_GIT_AUTHOR_EMAIL: ${ROBGJC_GIT_AUTHOR_EMAIL:?ROBGJC_GIT_AUTHOR_EMAIL must be set in .env}
      ROBGJC_REPO_ALLOWLIST: ${ROBGJC_REPO_ALLOWLIST:?ROBGJC_REPO_ALLOWLIST must be set in .env}
      ROBGJC_MAINTAINER_LOGINS: ${ROBGJC_MAINTAINER_LOGINS:-}
      ROBGJC_REVIEWER_BOTS: ${ROBGJC_REVIEWER_BOTS:-}

      # --- model selection ---
      ROBGJC_MODEL: ${ROBGJC_MODEL:-anthropic/claude-sonnet-4-6}
      ROBGJC_PROVIDER: ${ROBGJC_PROVIDER:-}
      ROBGJC_THINKING: ${ROBGJC_THINKING:-high}

      # --- runtime tuning ---
      ROBGJC_MAX_CONCURRENCY: ${ROBGJC_MAX_CONCURRENCY:-8}
      ROBGJC_TASK_TIMEOUT_SECONDS: ${ROBGJC_TASK_TIMEOUT_SECONDS:-2400}
      ROBGJC_TASK_TIMEOUT_HARD_GRACE_SECONDS: ${ROBGJC_TASK_TIMEOUT_HARD_GRACE_SECONDS:-60}
      ROBGJC_REQUEST_TIMEOUT_SECONDS: ${ROBGJC_REQUEST_TIMEOUT_SECONDS:-120}
      ROBGJC_RATE_LIMIT_WINDOW_SECONDS: ${ROBGJC_RATE_LIMIT_WINDOW_SECONDS:-3600}
      ROBGJC_RATE_LIMIT_DEFAULT: ${ROBGJC_RATE_LIMIT_DEFAULT:-3}
      ROBGJC_RATE_LIMIT_CONTRIBUTOR: ${ROBGJC_RATE_LIMIT_CONTRIBUTOR:-10}
      ROBGJC_RATE_LIMIT_UNLIMITED: ${ROBGJC_RATE_LIMIT_UNLIMITED:-}
      ROBGJC_QUESTION_AUTOCLOSE_ENABLED: ${ROBGJC_QUESTION_AUTOCLOSE_ENABLED:-true}
      ROBGJC_QUESTION_AUTOCLOSE_HOURS: ${ROBGJC_QUESTION_AUTOCLOSE_HOURS:-4}
      ROBGJC_QUESTION_AUTOCLOSE_SCAN_SECONDS: ${ROBGJC_QUESTION_AUTOCLOSE_SCAN_SECONDS:-60}
      ROBGJC_REPLAY_TOKEN: ${ROBGJC_REPLAY_TOKEN:-}

      # --- container-fixed paths ---
      ROBGJC_GJC_COMMAND: gjc
      ROBGJC_WORKSPACE_ROOT: /data/workspaces
      ROBGJC_SQLITE_PATH: /data/robogjc.sqlite
      ROBGJC_LOG_DIR: /data/logs
      ROBGJC_BIND_HOST: ${ROBGJC_BIND_HOST:-0.0.0.0}
      ROBGJC_BIND_PORT: ${ROBGJC_BIND_PORT:-8080}
      PI_ROOT: /work/pi
    depends_on:
      gh-proxy:
        condition: service_started
    # Resolve `llm-gateway.internal` (used in /srv/agent-home/.gjc/agent/models.yml) to the
    # Docker host. The actual gateway listens on 127.0.0.1:4000 on the host;
    # `host-gateway` is Docker's alias for the host bridge IP.
    extra_hosts:
      - "llm-gateway.internal:host-gateway"
    networks:
      - default
      - robogjc_internal
    volumes:
      - ${PI_ROOT:-../..}:/work/pi:ro
      - robogjc_data:/data
      # Host agent config is mounted read-only under /srv/agent-home-stage
      # with host-controlled permissions. The entrypoint copies it into
      # root-owned, world-readable files under /srv/agent-home; the agent
      # subprocess runs with HOME=/srv/agent-home, so ~/.gjc and ~/.agent
      # resolve there without exposing mutable host mounts.
      - ${HOME}/.gjc/agent/models.container.yml:/srv/agent-home-stage/.gjc/agent/models.yml:ro
      - ${HOME}/.agent/AGENT.md:/srv/agent-home-stage/.agent/AGENTS.md:ro
      - ${HOME}/.agent/rules:/srv/agent-home-stage/.agent/rules:ro
    ports:
      - "0.0.0.0:6543:8080"

  # ───────────────────────────────────────────────────────────────────────────
  # gh-proxy
  #
  # The only container that ever holds GITHUB_TOKEN. Reachable only from the
  # orchestrator on the internal-only network — no host port mapping. Every
  # request must carry a valid HMAC signature (ROBGJC_GH_PROXY_HMAC_KEY).
  # `env_file:` is INTENTIONALLY ABSENT for the same reason: the explicit
  # allowlist below is the only place where any var lands in this container.
  # ───────────────────────────────────────────────────────────────────────────
  gh-proxy:
    image: robogjc:dev
    container_name: gh-proxy
    restart: unless-stopped
    command: ["robogjc", "proxy", "serve"]
    environment:
      # PAT: lives ONLY here. The orchestrator's compose block refuses to
      # let this var into its container.
      GITHUB_TOKEN: ${GITHUB_TOKEN:?GITHUB_TOKEN must be set in .env}
      # Shared with the orchestrator: HMAC verification key.
      ROBGJC_GH_PROXY_HMAC_KEY: ${ROBGJC_GH_PROXY_HMAC_KEY:?ROBGJC_GH_PROXY_HMAC_KEY must be set in .env}
      # The proxy reuses the SandboxManager pool layout under /data/workspaces.
      ROBGJC_WORKSPACE_ROOT: /data/workspaces
      ROBGJC_SQLITE_PATH: /data/robogjc.sqlite
      ROBGJC_LOG_DIR: /data/logs
      # Bind on the internal network only.
      ROBGJC_GH_PROXY_BIND_HOST: 0.0.0.0
      ROBGJC_GH_PROXY_BIND_PORT: 8081
      # Settings still requires these on construction; the proxy never uses
      # them but the validator runs the same code path as the orchestrator.
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:?GITHUB_WEBHOOK_SECRET must be set in .env}
      ROBGJC_BOT_LOGIN: ${ROBGJC_BOT_LOGIN:?ROBGJC_BOT_LOGIN must be set in .env}
      ROBGJC_GIT_AUTHOR_EMAIL: ${ROBGJC_GIT_AUTHOR_EMAIL:?ROBGJC_GIT_AUTHOR_EMAIL must be set in .env}
      ROBGJC_REPO_ALLOWLIST: ${ROBGJC_REPO_ALLOWLIST:?ROBGJC_REPO_ALLOWLIST must be set in .env}
    networks:
      # `default` gives gh-proxy outbound NAT to api.github.com; `robogjc_internal`
      # is how the orchestrator reaches it. No `ports:` mapping → still
      # unreachable from the host or any sibling project.
      - default
      - robogjc_internal
    volumes:
      # Shared workspace pool/worktrees so the proxy can drive git operations
      # against the same per-issue worktrees the orchestrator builds.
      - robogjc_data:/data

networks:
  # External-facing bridge: webhook ingress (8080) and the orchestrator's
  # outbound path to the host LLM gateway via extra_hosts.
  default: {}
  # Orchestrator <-> gh-proxy only. internal: true means no egress and no
  # ingress from outside the compose project.
  robogjc_internal:
    internal: true

volumes:
  # Docker-managed Linux volume so UID/GID permissions on /data are enforced.
  robogjc_data: {}
